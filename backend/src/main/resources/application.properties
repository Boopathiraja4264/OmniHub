# Microsoft Graph API Configuration (OneDrive & Outlook)
microsoft.client.id=${MICROSOFT_CLIENT_ID}
microsoft.client.secret=${MICROSOFT_CLIENT_SECRET}
microsoft.user.id=${MICROSOFT_USER_ID}
microsoft.refresh.token=${MICROSOFT_REFRESH_TOKEN}
microsoft.redirect.uri=${MICROSOFT_REDIRECT_URI:http://localhost:8080/auth/callback}
spring.jackson.serialization.fail-on-empty-beans=false

# ── Actuator ──────────────────────────────────────────────────────────────────
# Render uses /actuator/health for health checks
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=OmniHub
info.app.version=1.0.0
info.app.description=Personal finance and fitness tracker

# ── Sentry ────────────────────────────────────────────────────────────────────
# Set SENTRY_DSN in .env — leave empty to disable locally
sentry.dsn=${SENTRY_DSN:}
sentry.traces-sample-rate=0.2
sentry.environment=${SENTRY_ENV:development}
sentry.logging.minimum-event-level=error
sentry.logging.minimum-breadcrumb-level=info

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.omnihub=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%thread] %logger{30} — %msg%n
