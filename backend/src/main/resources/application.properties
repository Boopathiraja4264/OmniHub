spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/finance_tracker}
spring.datasource.username=${DB_USERNAME:boopathirajak}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:FinanceTrackerSecretKeyThatIsVeryLongAndSecure}
jwt.expiration=86400000

server.port=${PORT:8080}
spring.application.name=finance-tracker
