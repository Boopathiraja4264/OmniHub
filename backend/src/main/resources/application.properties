spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/omni_hub}
spring.datasource.username=${DB_USERNAME:boopathirajak}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
# HikariCP — tuned for Neon free tier (max 5 connections)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

server.port=${PORT:8080}
spring.application.name=omni-hub

# Mail Configuration (Gmail SMTP for transactional emails)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Microsoft Graph API Configuration (OneDrive & Outlook)
microsoft.client.id=${MICROSOFT_CLIENT_ID}
microsoft.client.secret=${MICROSOFT_CLIENT_SECRET}
microsoft.user.id=${MICROSOFT_USER_ID}
microsoft.refresh.token=${MICROSOFT_REFRESH_TOKEN}
microsoft.redirect.uri=${MICROSOFT_REDIRECT_URI:http://localhost:8080/auth/callback}
spring.jackson.serialization.fail-on-empty-beans=false

# ── Exercise API (API Ninjas) ─────────────────────────────────────────────────
# Get free API key from api-ninjas.com
exercise.api-key=${EXERCISE_API_KEY:}

# ── SMS (Fast2SMS) ────────────────────────────────────────────────────────────
# Get free API key from fast2sms.com — leave empty to disable
fast2sms.api-key=${FAST2SMS_API_KEY:}

# ── Actuator ──────────────────────────────────────────────────────────────────
# Render uses /actuator/health for health checks
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
info.app.name=OmniHub
info.app.version=1.0.0
info.app.description=Personal finance and fitness tracker

# ── Sentry ────────────────────────────────────────────────────────────────────
# Set SENTRY_DSN in .env — leave empty to disable locally
sentry.dsn=${SENTRY_DSN:}
sentry.traces-sample-rate=0.2
sentry.environment=${SENTRY_ENV:development}
sentry.logging.minimum-event-level=error
sentry.logging.minimum-breadcrumb-level=info

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.omnihub=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%thread] %logger{30} — %msg%n
# ── CORS ──────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── App base URL (used in email links) ───────────────────────────────────────
app.base-url=${APP_BASE_URL:http://localhost:3000}

# ── Cookie security (set APP_COOKIE_SECURE=true + APP_COOKIE_SAME_SITE=None in prod) ──
app.cookie.secure=${APP_COOKIE_SECURE:false}
app.cookie.same-site=${APP_COOKIE_SAME_SITE:Lax}

# ── Encryption key for TOTP secrets and PII (base64-encoded 32-byte key) ─────
# Generate: openssl rand -base64 32
encryption.key=${ENCRYPTION_KEY:}

# ── OAuth2 SSO ────────────────────────────────────────────────────────────────
# Providers are registered programmatically in OAuth2ClientConfig.java
# Set these env vars to enable SSO (empty = provider disabled at startup)
# GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
# GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET
# MICROSOFT_SSO_CLIENT_ID, MICROSOFT_SSO_CLIENT_SECRET
# LINKEDIN_CLIENT_ID, LINKEDIN_CLIENT_SECRET
