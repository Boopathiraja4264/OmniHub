spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/omni_hub}
spring.datasource.username=${DB_USERNAME:boopathirajak}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
# HikariCP — tuned for Neon free tier (max 5 connections)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:OmniHubSecretKeyThatIsVeryLongAndSecure}
jwt.expiration=86400000

server.port=${PORT:8080}
spring.application.name=omni-hub

