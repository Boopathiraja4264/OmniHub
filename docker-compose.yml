version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: omnihub-db
    environment:
      POSTGRES_DB: omni_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: omnihub-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/omni_hub
      DB_USERNAME: postgres
      DB_PASSWORD: password
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JWT_SECRET: ${JWT_SECRET:-OmniHubSecretKeyThatIsVeryLongAndSecure}
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: omnihub-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
