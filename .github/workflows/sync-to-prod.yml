name: Sync to Prod Repo

on:
  push:
    branches: [main]

jobs:
  sync:
    name: Push to omnihub-prod/dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout OmniHub code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug PAT
        env:
          PAT: ${{ secrets.PROD_REPO_PAT }}
        run: |
          if [ -z "$PAT" ]; then
            echo "PAT is EMPTY!"
          else
            echo "PAT length: ${#PAT}"
            echo "PAT starts with: ${PAT:0:4}"
          fi

      - name: Push to omnihub-prod dev branch
        env:
          REPO_PAT: ${{ secrets.PROD_REPO_PAT }}
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git remote add prod "https://x-access-token:${REPO_PAT}@github.com/Boopathiraja4264/omnihub-prod.git"
          git push prod main:dev --force
