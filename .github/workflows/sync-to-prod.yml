name: Sync to Prod Repo

on:
  push:
    branches: [main]

jobs:
  sync:
    name: Push to omnihub-prod/dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout OmniHub code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PROD_REPO_PAT }}

      - name: Push to omnihub-prod dev branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add prod "https://github.com/Boopathiraja4264/omnihub-prod.git"
          git push prod main:dev --force
        env:
          GITHUB_TOKEN: ${{ secrets.PROD_REPO_PAT }}
