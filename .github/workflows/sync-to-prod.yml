name: Sync to Prod Repo

on:
  push:
    branches: [ main ]

jobs:
  sync:
    name: Push to omnihub-prod/dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout OmniHub code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to omnihub-prod dev branch
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git remote add prod https://Boopathiraja4264:${{ secrets.PROD_REPO_PAT }}@github.com/Boopathiraja4264/omnihub-prod.git
          git push prod main:dev --force
          echo "Synced to omnihub-prod/dev successfully"
